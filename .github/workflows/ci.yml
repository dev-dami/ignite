name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Verify Formatting
        run: cargo fmt --all -- --check

      - name: Cargo Check
        run: cargo check --all-targets

      - name: Cargo Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test --all

  release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Release CLI
        run: cargo build --release --bin ignite-cli

      - name: Package Binary
        run: |
          mkdir -p dist
          mv target/release/ignite-cli target/release/ignite
          tar -czf dist/ignite-linux-amd64.tar.gz -C target/release ignite
          sha256sum dist/ignite-linux-amd64.tar.gz > dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ignite-linux-amd64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
